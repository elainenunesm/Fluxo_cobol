<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBOL Flow</title>

<script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f5f5;
    color: #333;
    overflow: hidden;
  }

  .container { display: flex; height: 100vh; user-select: none; }

  /* ===== PAINEL ESQUERDO ===== */
  .left {
    width: 34%;
    min-width: 180px;
    max-width: 70%;
    display: flex;
    flex-direction: column;
    padding: 16px;
    background: #ffffff;
    gap: 10px;
    overflow: hidden;
  }

  .left h3 {
    margin: 0;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    width: 100%;
    resize: none;
    padding: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    background: #fafafa;
    color: #222;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
    transition: border-color .2s;
    overflow-y: auto;
  }

  textarea:focus { border-color: #2e7d32; }

  .btn-gerar {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    background: #2e7d32;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .2s;
  }
  .btn-gerar:hover { background: #1b5e20; }

  .btn-importar {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .2s;
  }
  .btn-importar:hover { background: #0d47a1; }

  /* ===== DIVISOR ARRASTÁVEL ===== */
  .divider {
    width: 5px;
    background: #e0e0e0;
    cursor: col-resize;
    flex-shrink: 0;
    transition: background .15s;
    position: relative;
  }
  .divider:hover, .divider.active { background: #2e7d32; }
  .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3px;
    height: 40px;
    border-radius: 2px;
    background: #ccc;
    pointer-events: none;
  }
  .divider:hover::after, .divider.active::after { background: #fff; }

  /* ===== PAINEL DIREITO ===== */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f5f5f5;
    overflow: hidden;
  }

  /* ===== TOOLBAR ZOOM ===== */
  .cy-toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    background: #fafafa;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }

  .cy-toolbar label {
    font-size: 12px;
    color: #888;
    margin-right: 2px;
  }

  .zoom-btn {
    width: 26px !important;
    height: 26px !important;
    padding: 0 !important;
    font-size: 16px !important;
    font-weight: 700 !important;
    background: #f0f0f0 !important;
    color: #333 !important;
    border: 1px solid #ddd !important;
    border-radius: 5px !important;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s !important;
  }
  .zoom-btn:hover { background: #e0e0e0 !important; }

  .btn-fit {
    height: 26px !important;
    padding: 0 10px !important;
    font-size: 12px !important;
    font-weight: 600 !important;
    background: #f0f0f0 !important;
    color: #333 !important;
    border: 1px solid #ddd !important;
    border-radius: 5px !important;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s !important;
  }
  .btn-fit:hover { background: #e0e0e0 !important; }

  .zoom-level {
    font-size: 12px;
    color: #555;
    min-width: 40px;
    text-align: center;
    font-family: monospace;
  }

  /* ===== SELETOR DE LAYOUT ===== */
  .layout-select {
    height: 26px;
    padding: 0 6px;
    font-size: 12px;
    font-family: Segoe UI, Arial, sans-serif;
    border: 1px solid #ddd;
    border-radius: 5px;
    background: #f0f0f0;
    color: #333;
    cursor: pointer;
    outline: none;
  }
  .layout-select:focus { border-color: #90caf9; }

  .btn-reorganizar {
    height: 26px;
    padding: 0 10px;
    font-size: 12px;
    font-weight: 600;
    background: #e3f2fd;
    color: #1565c0;
    border: 1px solid #90caf9;
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s;
  }
  .btn-reorganizar:hover { background: #bbdefb; }

  /* ===== BOTÃO EXPORTAR ===== */
  .btn-exportar-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .btn-exportar {
    height: 26px;
    padding: 0 10px;
    font-size: 12px;
    font-weight: 600;
    background: #f3e5f5;
    color: #6a1b9a;
    border: 1px solid #ce93d8;
    border-radius: 5px;
    cursor: pointer;
    transition: background .15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .btn-exportar:hover { background: #e1bee7; }
  .export-menu {
    display: none;
    position: absolute;
    top: 30px;
    right: 0;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    z-index: 9999;
    min-width: 175px;
    padding: 4px 0;
  }
  .export-menu.open { display: block; }
  .export-menu button {
    display: block;
    width: 100%;
    padding: 8px 14px;
    text-align: left;
    background: none;
    border: none;
    font-size: 13px;
    font-family: Segoe UI, Arial, sans-serif;
    cursor: pointer;
    color: #333;
    transition: background .12s;
  }
  .export-menu button:hover { background: #f5f5f5; }
  .export-menu .menu-sep {
    border: none;
    border-top: 1px solid #eee;
    margin: 4px 0;
  }

  .toolbar-sep {
    width: 1px;
    height: 18px;
    background: #ddd;
    margin: 0 4px;
    flex-shrink: 0;
  }

  #cy {
    flex: 1;
    background: #ffffff;
  }

  #details {
    height: 22%;
    min-height: 40px;
    max-height: 80%;
    border-top: none;           /* borda ficará no divisor */
    padding: 12px 16px;
    white-space: pre-wrap;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: #1b5e20;
    background: #f9f9f9;
    overflow-y: auto;
    flex-shrink: 0;
  }

  /* ===== DIVISOR HORIZONTAL (details) ===== */
  .divider-h {
    height: 6px;
    background: #e0e0e0;
    cursor: row-resize;
    flex-shrink: 0;
    position: relative;
    transition: background .15s;
  }
  .divider-h:hover, .divider-h.active { background: #1565c0; }
  /* pontilhado central */
  .divider-h::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 36px;
    height: 2px;
    border-top: 1px dotted #999;
    border-bottom: 1px dotted #999;
  }
  .divider-h:hover::after, .divider-h.active::after { border-color: #fff; }

  /* ===== DIVISOR COMENTÁRIOS (vertical) ===== */
  .comments-divider {
    width: 0;
    background: #e0e0e0;
    cursor: col-resize;
    flex-shrink: 0;
    transition: width .25s;
    overflow: hidden;
  }
  .comments-divider.open {
    width: 5px;
    transition: width .25s;
  }
  .comments-divider.open:hover { background: #ff6f00; }

  /* ===== PAINEL DE COMENTÁRIOS ===== */
  .comments-panel {
    width: 0;
    min-width: 0;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    background: #fffde7;
    border-left: none;
    overflow: hidden;
    transition: width .25s, min-width .25s;
    flex-shrink: 0;
  }
  .comments-panel.open {
    width: 260px;
    min-width: 200px;
    border-left: 1px solid #ffe082;
  }
  .comments-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    background: #fff8e1;
    border-bottom: 1px solid #ffe082;
    flex-shrink: 0;
  }
  .comments-header span {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #795548;
  }
  .comments-header button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #aaa;
    line-height: 1;
    padding: 0 2px;
    transition: color .15s;
  }
  .comments-header button:hover { color: #c62828; }

  /* Abas do painel */
  .comments-tabs {
    display: flex;
    border-bottom: 2px solid #ffe082;
    flex-shrink: 0;
    background: #fff8e1;
  }
  .comments-tab {
    flex: 1;
    padding: 8px 4px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    color: #aaa;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color .15s, border-color .15s;
  }
  .comments-tab.active {
    color: #ff6f00;
    border-bottom-color: #ff6f00;
  }
  .comments-tab:hover:not(.active) { color: #795548; }

  /* Aba Bloco */
  .comments-pane {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .comments-pane.active { display: flex; }

  .comments-node-area {
    padding: 10px 12px 6px;
    border-bottom: 1px solid #ffe082;
    flex-shrink: 0;
  }
  .comments-node-label {
    font-size: 11px;
    font-weight: 600;
    color: #795548;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .comments-node-label span {
    font-weight: 400;
    color: #555;
  }
  #comments-textarea {
    width: 100%;
    box-sizing: border-box;
    height: 100px;
    resize: vertical;
    font-family: Segoe UI, Arial, sans-serif;
    font-size: 12px;
    line-height: 1.5;
    padding: 7px 8px;
    border: 1px solid #ffe082;
    border-radius: 5px;
    background: #fff;
    color: #333;
    outline: none;
    transition: border-color .2s;
  }
  #comments-textarea:focus { border-color: #ff6f00; }
  #comments-textarea:disabled { background: #f9f2e0; color: #aaa; }
  .comments-save-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .btn-comment-save {
    flex: 1;
    padding: 6px 0;
    font-size: 12px;
    font-weight: 600;
    background: #ff6f00;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-comment-save:hover { background: #e65100; }
  .btn-comment-save:disabled { background: #ccc; cursor: default; }
  .btn-comment-del {
    padding: 6px 8px;
    font-size: 12px;
    font-weight: 600;
    background: #fff;
    color: #c62828;
    border: 1px solid #ef9a9a;
    border-radius: 5px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-comment-del:hover { background: #ffebee; }
  .btn-comment-del:disabled { opacity: 0.3; cursor: default; }
  .comments-saved-msg {
    font-size: 11px;
    color: #2e7d32;
    display: none;
  }
  /* preview do comentário já salvo (aba Bloco) */
  .comments-current-preview {
    margin: 8px 12px 0;
    padding: 7px 10px;
    background: #fff;
    border: 1px dashed #ffe082;
    border-radius: 5px;
    font-size: 11.5px;
    color: #555;
    white-space: pre-wrap;
    word-break: break-word;
    flex-shrink: 0;
    display: none;
  }

  /* Aba Geral */
  .comments-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px 8px;
  }
  /* contador de badge */
  .comments-tab-badge {
    display: inline-block;
    min-width: 16px;
    padding: 1px 4px;
    background: #ff6f00;
    color: #fff;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 4px;
    vertical-align: middle;
    display: none;
  }
  .comment-item {
    background: #fff;
    border: 1px solid #ffe082;
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 7px;
    cursor: pointer;
    transition: box-shadow .15s, border-color .15s;
  }
  .comment-item:hover { border-color: #ff6f00; box-shadow: 0 2px 6px rgba(255,111,0,.15); }
  .comment-item-title {
    font-size: 11.5px;
    font-weight: 700;
    color: #795548;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .comment-item-text {
    font-size: 11.5px;
    color: #555;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 52px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .comments-empty {
    font-size: 11.5px;
    color: #bbb;
    text-align: center;
    padding: 20px 8px;
  }
  /* indicador de comentário no nó */
  .cy-has-comment {
    border-style: dashed;
    border-color: #ff6f00 !important;
  }
  /* botão Comentários na toolbar */
  .btn-comentarios {
    height: 26px;
    padding: 0 10px;
    font-size: 12px;
    font-weight: 600;
    background: #fff8e1;
    color: #795548;
    border: 1px solid #ffe082;
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s;
  }
  .btn-comentarios:hover { background: #ffecb3; }
  .btn-comentarios.active { background: #ff6f00; color: #fff; border-color: #e65100; }

  /* Botões de sessão (Salvar / Abrir) na toolbar */
  .btn-sessao-salvar, .btn-sessao-abrir {
    height: 26px;
    padding: 0 10px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s;
  }
  .btn-sessao-salvar {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
  }
  .btn-sessao-salvar:hover { background: #c8e6c9; }
  .btn-sessao-abrir {
    background: #e3f2fd;
    color: #1565c0;
    border: 1px solid #90caf9;
  }
  .btn-sessao-abrir:hover { background: #bbdefb; }

  /* ===================================================
     RESPONSIVO — MOBILE-FIRST
  ===================================================== */

  /* Tab bar de navegação — oculta no desktop */
  .mobile-tab-bar { display: none; }

  /* ─── Tablet (601 – 960 px) ──────────────────────── */
  @media (max-width: 960px) {
    .left { width: 38%; min-width: 160px; }
    .cy-toolbar { flex-wrap: wrap; row-gap: 4px; padding: 6px 8px; }
    .layout-select { max-width: 110px; }
  }

  /* ─── Mobile (≤ 600 px) ──────────────────────────── */
  @media (max-width: 600px) {

    /* ---- Estrutura base ---- */
    body { overflow: hidden; }
    .container {
      flex-direction: column;
      /* 100svh = "small viewport height": altura da tela com TODAS as
         barras do browser visíveis. Resolve o bug clássico do iOS Safari
         onde 100vh é maior que o espaço realmente visível, empurrando
         botões para fora da tela. Fallback 100vh para browsers antigos. */
      height: 100vh;
      height: 100svh;
      padding-bottom: 52px;   /* espaço para tab bar fixa */
    }

    /* ---- Painel Código (esquerdo) ---- */
    .left {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      flex: 1 1 0;
      min-height: 0;
      overflow: hidden;           /* explícito — garante que a textarea não vaze */
      padding: 12px 12px 8px;
      gap: 8px;
      display: none;              /* controlado pelas abas */
    }
    /* min-height:0 + height:0 permitem que o flex controle o tamanho
       da textarea sem que o conteúdo empurre os botões para fora */
    .left textarea { min-height: 0; height: 0; }
    /* Oculta o título "COBOL Input" — desnecessário no mobile */
    .left h3 { display: none; }

    /* ---- Painel Diagrama (direito) ---- */
    .right {
      width: 100% !important;
      flex: 1 1 0;
      min-height: 0;
      display: none;              /* controlado pelas abas */
      flex-direction: column;
    }

    /* ---- Aba ativa mostra o painel correspondente ---- */
    .container.mob-code .left  { display: flex !important; }
    .container.mob-flow .right { display: flex !important; }

    /* ---- Divisor vertical (substituído pela tab bar) ---- */
    .divider { display: none !important; }

    /* ---- Textarea ---- */
    textarea { font-size: 13px; line-height: 1.6; }

    /* ---- Botões do painel Código ---- */
    .btn-importar, .btn-gerar {
      padding: 13px 8px;
      font-size: 15px;
      border-radius: 8px;
    }

    /* ---- Toolbar ---- */
    .cy-toolbar {
      flex-wrap: wrap;
      row-gap: 5px;
      column-gap: 4px;
      padding: 7px 8px;
    }
    .toolbar-sep { display: none; }
    /* Oculta labels de texto puro */
    .cy-toolbar > span:not(.zoom-level) { display: none; }

    /* Zoom — alvos de toque maiores */
    .zoom-btn   { width: 36px !important; height: 36px !important; font-size: 18px !important; }
    .zoom-level { font-size: 13px; min-width: 46px; }
    .btn-fit    { height: 36px !important; font-size: 13px !important; padding: 0 12px !important; }

    /* Layout + Reorganizar */
    .layout-select   { flex: 1; height: 36px; font-size: 13px; max-width: unset; }
    .btn-reorganizar { height: 36px; font-size: 13px; flex: 0 0 auto; }

    /* Exportar / Salvar / Abrir / Comentários */
    .btn-exportar                       { height: 36px; font-size: 12px; padding: 0 10px; }
    .btn-sessao-salvar, .btn-sessao-abrir { height: 36px; font-size: 12px; padding: 0 8px; }
    .btn-comentarios                    { height: 36px; font-size: 12px; padding: 0 8px; }

    /* Menu Exportar: abre para cima para não sair da tela */
    .export-menu {
      top: auto !important;
      bottom: calc(100% + 4px) !important;
    }

    /* ---- Painel de detalhes ---- */
    #details { height: 90px; font-size: 12px; padding: 8px 10px; }

    /* ---- Painel de comentários → bottom sheet deslizante ---- */
    .comments-divider { display: none !important; }
    .comments-panel {
      position: fixed !important;
      bottom: 52px !important;   /* acima da tab bar */
      left: 0 !important;
      right: 0 !important;
      top: auto !important;
      width: 100% !important;
      min-width: 0 !important;
      max-width: 100% !important;
      height: 0 !important;
      border-left: none !important;
      border-top: 2px solid #ffe082;
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,.18);
      transition: height .3s ease !important;
      z-index: 800;
    }
    .comments-panel.open {
      height: 65vh !important;
      width: 100% !important;
    }

    /* ---- Tab bar de navegação (fixa no rodapé) ---- */
    .mobile-tab-bar {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: #fff;
      border-top: 1px solid #ddd;
      z-index: 900;
      box-shadow: 0 -2px 8px rgba(0,0,0,.10);
    }
    .mobile-tab {
      flex: 1;
      border: none;
      background: none;
      color: #aaa;
      cursor: pointer;
      border-top: 3px solid transparent;
      padding: 3px 0 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      font-weight: 600;
      transition: color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-tab.active { color: #2e7d32; border-top-color: #2e7d32; }
    .mobile-tab-icon   { font-size: 20px; line-height: 1; }
    .mobile-tab-label  { font-size: 10px; line-height: 1; }
  }
</style>
</head>

<body>

<div class="container">

<div class="left" id="left-panel">
<h3>COBOL Input</h3>


<textarea id="input">
      *-----------------------------------------------------------------
       IDENTIFICATION DIVISION.
      *-----------------------------------------------------------------
       PROGRAM-ID.       CADCACGC.
      *-----------------------------------------------------------------
      *  OBJETIVO : Calcula o digito do CNPJ (CGC)
      *-----------------------------------------------------------------
       DATA DIVISION.
       WORKING-STORAGE SECTION.
       01  WS-AUX PIC 9(008) VALUE ZEROES.
       LINKAGE SECTION.
       01  LKS-PARAMETRO.
           05 LKS-RETORNO   PIC 9(001).
           05 LKS-NUMERO-I  PIC X(012).
           05 LKS-NUMERO-C  PIC 9(014).
      *-----------------------------------------------------------------
       PROCEDURE DIVISION USING LKS-PARAMETRO.
      *-----------------------------------------------------------------
           PERFORM P1000-INICIAL
           PERFORM P2000-PRINCIPAL
           PERFORM P4000-FINAL
           GOBACK.

      *-----------------------------------------------------------------
       P1000-INICIAL.
      *-----------------------------------------------------------------
           IF LKS-NUMERO-I NOT NUMERIC
               MOVE 1 TO LKS-RETORNO
               GOBACK
           ELSE
               MOVE LKS-NUMERO-I TO WS-AUX
           END-IF.

       P1000-FIM.
           EXIT.

      *-----------------------------------------------------------------
       P2000-PRINCIPAL.
      *-----------------------------------------------------------------
           MOVE 01 TO WS-AUX
           PERFORM P3000-CALC-DIGITO THRU P3000-FIM
           MOVE 02 TO WS-AUX
           PERFORM P3000-CALC-DIGITO THRU P3000-FIM.

       P2000-FIM.
           EXIT.

      *-----------------------------------------------------------------
       P3000-CALC-DIGITO.
      *-----------------------------------------------------------------
           PERFORM UNTIL WS-AUX GREATER 12
               COMPUTE WS-AUX = WS-AUX + 1
           END-PERFORM
           IF WS-AUX EQUAL 0 OR 1
               MOVE ZEROES TO LKS-NUMERO-C
           ELSE
               MOVE WS-AUX TO LKS-NUMERO-C
           END-IF.

       P3000-FIM.
           EXIT.

      *-----------------------------------------------------------------
       P4000-FINAL.
      *-----------------------------------------------------------------
           MOVE 0          TO LKS-RETORNO.
           MOVE WS-AUX     TO LKS-NUMERO-C.

       P4000-FIM.
           EXIT.
</textarea>

<script>

// ================= IMPORTAR TXT =================
function importarTxt(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('input').value = e.target.result;
  };
  reader.readAsText(file);
  // Limpa o input para permitir reimportar o mesmo arquivo
  event.target.value = '';
}

// ================= PARSE =================
function parseCobol(code) {
  const lines = code.split("\n");
  let estrutura = {};          // nome -> linhas[]
  let tipos = {};              // nome -> 'section' | 'paragrafo'
  let secoes = {};             // sectionNome -> [parágrafoNome, ...]
  let ordemParagrafos = [];    // todos em ordem de aparição
  let atual = null;
  let secaoAtual = null;
  let programId = null;

  // Sections de outras divisões (DATA, ENV) — ignoradas no fluxo
  const sectionsNaoProcedure = new Set([
    'CONFIGURATION', 'INPUT-OUTPUT', 'FILE', 'WORKING-STORAGE',
    'LOCAL-STORAGE', 'LINKAGE', 'REPORT', 'SCREEN',
    'COMMUNICATION', 'PROGRAM-LIBRARY'
  ]);

  // Palavras que terminam com '.' mas NÃO são parágrafos
  const reservadasDiv = new Set([
    'IDENTIFICATION', 'ENVIRONMENT', 'DATA', 'PROCEDURE',
    'GOBACK', 'STOP', 'EXIT', 'CONTINUE'
  ]);

  let inProcedure = false;

  lines.forEach(rawLine => {
    // ── Formato fixo COBOL ──────────────────────────────────────────
    //  Cols 1-6  (índices 0-5) : número de sequência
    //  Col  7    (índice  6)   : indicador  (* ou / = comentário)
    //  Cols 8-11 (índices 7-10): Area A  — parágrafos e seções
    //  Cols 12-72(índices 11-71): Area B — instruções
    //  Cols 73-80(índices 72-79): identificação (ignorada)

    let l = rawLine.trim().toUpperCase();
    if (!l) return;

    // Comentários: formato fixo (col 7 = * ou /) ou livre (*>)
    if ((rawLine.length > 6 && (rawLine[6] === '*' || rawLine[6] === '/')) || l.startsWith('*>')) {
      return; // ignora completamente
    }

    // Captura PROGRAM-ID antes do PROCEDURE DIVISION
    if (!inProcedure) {
      const pidMatch = l.match(/^PROGRAM-ID\.?\s+([A-Z0-9][A-Z0-9-]*)/);
      if (pidMatch) { programId = pidMatch[1]; return; }
    }

    // Detecta PROCEDURE DIVISION (pode ter USING ...)
    if (/^PROCEDURE\s+DIVISION\b/.test(l)) {
      inProcedure = true;
      // Cria parágrafo implícito com o nome do programa para o bloco de entrada
      let entryName = programId || 'PROCEDURE';
      atual = entryName;
      estrutura[entryName] = [];
      tipos[entryName] = 'paragrafo';
      ordemParagrafos.push(entryName);
      return;
    }

    // Antes do PROCEDURE DIVISION ignora tudo
    if (!inProcedure) return;

    // Detecta SECTION dentro do PROCEDURE DIVISION
    const secMatch = l.match(/^([A-Z0-9][A-Z0-9-]*)\s+SECTION\.?$/);
    if (secMatch) {
      let secNome = secMatch[1];
      if (!sectionsNaoProcedure.has(secNome)) {
        secaoAtual = secNome;
        atual = secaoAtual;
        estrutura[secaoAtual] = [];
        tipos[secaoAtual] = 'section';
        secoes[secaoAtual] = [];
        ordemParagrafos.push(secaoAtual);
      }
      return;
    }

    // Detecta parágrafo pela posição na Area A (índices 7-10)
    let firstChar = -1;
    for (let i = 0; i < rawLine.length; i++) {
      if (rawLine[i] !== ' ') { firstChar = i; break; }
    }
    let isAreaA = (firstChar >= 7 && firstChar <= 10);

    // Aceita: "PARANAME." ou "PARANAME. EXIT." na mesma linha (ambos declaram fim de parágrafo)
    const paraMatch = isAreaA ? l.match(/^([A-Z0-9][A-Z0-9-]*)\.(?:\s+EXIT\.)?$/) : null;
    if (paraMatch && !paraMatch[1].startsWith('END-')) {
      let nome = paraMatch[1];
      if (!reservadasDiv.has(nome)) {
        atual = nome;
        estrutura[nome] = [];
        tipos[nome] = 'paragrafo';
        if (secaoAtual) secoes[secaoAtual].push(nome);
        ordemParagrafos.push(nome);
        return;
      }
    }

    if (!atual) return;
    estrutura[atual].push(l);
  });

  // Pós-processamento: paragráfos cujo conteúdo significativo é apenas EXIT
  // são marcadores de fim (convenção COBOL para PERFORM THRU), não parágrafos reais
  Object.keys(estrutura).forEach(nome => {
    if (tipos[nome] !== 'paragrafo') return;
    const temConteudo = (estrutura[nome] || []).some(l => {
      const u = l.trim().toUpperCase().replace(/\.$/, '');
      return u && u !== 'EXIT' && u !== 'EXIT PARAGRAPH' && u !== 'EXIT SECTION';
    });
    if (!temConteudo) tipos[nome] = 'fim-paragrafo';
  });

  return { estrutura, tipos, secoes, ordemParagrafos, programId };
}

// ================= AST BUILDER =================
// Converte linhas de um parágrafo em uma árvore de nós de execução.
// EXIT sozinho é convenção de limite — ignorado visualmente.
function buildAST(linhas) {
  let nodes = [];
  let i = 0;
  while (i < linhas.length) {
    let l = linhas[i].trim().replace(/\.$/, '');
    let lUp = l.toUpperCase();
    i++;
    if (!l) continue;
    // EXIT PROGRAM — encerra o programa
    if (/^EXIT\s+PROGRAM\b/.test(lUp)) {
      nodes.push({ type: 'stop', label: 'EXIT PROGRAM' });
      break;
    }
    // EXIT sozinho / EXIT PARAGRAPH / EXIT SECTION — encerra o parágrafo
    if (/^EXIT(\s+(PARAGRAPH|SECTION|PERFORM))?$/.test(lUp)) break;
    if (/^STOP\s+RUN/.test(lUp) || /^GOBACK$/.test(lUp)) {
      nodes.push({ type: 'stop', label: lUp.startsWith('STOP') ? 'STOP RUN' : 'GOBACK' });
      break;
    }
    if (/^IF[\s(]/.test(lUp) || lUp === 'IF') {
      // Coleta a condição completa: AND/OR podem estar na mesma linha ou nas linhas seguintes
      let condLabel = l;
      while (i < linhas.length) {
        let peek = linhas[i].trim().replace(/\.$/, '').toUpperCase();
        // Linha de continuação de condição: começa com AND ou OR (possivelmente seguido de NOT)
        if (/^(AND|OR)\b/.test(peek)) {
          condLabel += ' ' + peek;
          i++;
        } else {
          break;
        }
      }
      let sim = [], nao = [], depth = 0, branch = 'SIM';
      while (i < linhas.length) {
        let cur = linhas[i];
        let rawBl = cur.trim();
        // Ponto final fecha TODOS os escopos abertos (equivale a END-IF no nível 0)
        let periodClose = rawBl.endsWith('.') && depth === 0;
        let bl = rawBl.replace(/\.$/, '').toUpperCase();
        i++;
        if (/^IF[\s(]/.test(bl) || bl === 'IF') depth++;
        if (/^END-IF/.test(bl)) {
          if (depth === 0) break;
          depth--;
          (branch === 'SIM' ? sim : nao).push(cur);
          continue;
        }
        if (/^ELSE$/.test(bl) && depth === 0) { branch = 'NAO'; continue; }
        if (bl) (branch === 'SIM' ? sim : nao).push(cur);
        if (periodClose) break; // ponto fecha o IF
      }
      nodes.push({ type: 'if', label: condLabel, sim: buildAST(sim), nao: buildAST(nao) });
      continue;
    }
    // ─── PERFORM ────────────────────────────────────────────────────────────────
    // Verbos que nunca são continuação de condição UNTIL
    const _cobolVerbs = /^(END-PERFORM|END-STRING|END-UNSTRING|END-EXEC|PERFORM|IF|ELSE|EVALUATE|WHEN|MOVE|COMPUTE|ADD|SUBTRACT|MULTIPLY|DIVIDE|CALL|DISPLAY|ACCEPT|OPEN|CLOSE|READ|WRITE|REWRITE|DELETE|STRING|UNSTRING|INSPECT|SEARCH|SORT|STOP|GOBACK|GO[\s\b]|GOTO\b|EXEC\b|EXIT)\b/;
    // 1. Inline loop (sem nome de parágrafo antes da cláusula):
    //    PERFORM [WITH TEST BEFORE|AFTER] UNTIL cond ... END-PERFORM
    //    PERFORM [WITH TEST BEFORE|AFTER] VARYING v FROM x BY y UNTIL ... END-PERFORM
    //    PERFORM n TIMES ... END-PERFORM
    const _inlineLoopRe = /^PERFORM\s+(?:WITH\s+TEST\s+(?:BEFORE|AFTER)\s+)?(?:UNTIL|VARYING)\b|^PERFORM\s+\d+\s+TIMES\b/;
    if (_inlineLoopRe.test(lUp)) {
      // Coleta condição possivelmente multi-linha (antes do corpo)
      let condLines = [lUp.replace(/^PERFORM\s+/, '')];
      while (i < linhas.length) {
        let pk = linhas[i].trim().replace(/\.$/, '').toUpperCase();
        if (!pk || _cobolVerbs.test(pk)) break;
        condLines.push(pk); i++;
      }
      let cond = condLines.join(' ');
      let body = [], nestDepth = 0;
      while (i < linhas.length) {
        let cur = linhas[i];
        let rawPl = cur.trim();
        let periodClosePl = rawPl.endsWith('.') && nestDepth === 0;
        let bl = rawPl.replace(/\.$/, '').toUpperCase();
        i++;
        if (_inlineLoopRe.test(bl)) nestDepth++;
        if (/^END-PERFORM/.test(bl)) {
          if (nestDepth === 0) break;
          nestDepth--; body.push(cur); continue;
        }
        if (bl) body.push(cur);
        if (periodClosePl) break; // ponto fecha o PERFORM inline
      }
      nodes.push({ type: 'loop', label: cond, body: buildAST(body) });
      continue;
    }
    // EVALUATE — switch/case: consome até END-EVALUATE
    if (/^EVALUATE\b/.test(lUp)) {
      let depth = 0;
      while (i < linhas.length) {
        let bl = linhas[i].trim().replace(/\.$/, '').toUpperCase();
        i++;
        if (/^EVALUATE\b/.test(bl)) depth++;
        if (/^END-EVALUATE/.test(bl)) { if (depth === 0) break; depth--; }
      }
      nodes.push({ type: 'evaluate', label: l });
      continue;
    }
    // STRING ... END-STRING — coleta todas as linhas e gera nó único
    if (/^STRING\b/.test(lUp)) {
      let allLines = [l];
      while (i < linhas.length) {
        let rawCur = linhas[i].trim();
        let periodCloseS = rawCur.endsWith('.');
        let cur = rawCur.replace(/\.$/, '');
        i++;
        if (/^END-STRING\b/i.test(cur)) break;
        if (cur) allLines.push(cur);
        if (periodCloseS) break; // ponto fecha o STRING
      }
      let allText = allLines.join(' ').toUpperCase();
      // Extrai primeira fonte (literal entre aspas simples ou variável)
      let firstSrcM = allLines[0].match(/STRING\s+('(?:[^']|'')*'|[A-Z0-9][A-Z0-9-]*)/i);
      let firstSrc = firstSrcM ? firstSrcM[1] : '...';
      // Trunca literal longo
      if (firstSrc.length > 20) firstSrc = firstSrc.substring(0, 19) + '\u2026';
      let intoM = allText.match(/\bINTO\s+([A-Z0-9][A-Z0-9-]*)/);
      let shortLabel = 'STRING ' + firstSrc + (intoM ? ' INTO ' + intoM[1] : '');
      let fullDetail = allLines.join('\n') + '\nEND-STRING';
      nodes.push({ type: 'instr', label: shortLabel, detail: fullDetail });
      continue;
    }
    // UNSTRING ... END-UNSTRING — coleta todas as linhas e gera nó único
    if (/^UNSTRING\b/.test(lUp)) {
      let allLinesU = [l];
      let srcM = lUp.match(/^UNSTRING\s+([A-Z0-9][A-Z0-9-]*)/);
      let src = srcM ? srcM[1] : '...';
      let intoVars = [];
      while (i < linhas.length) {
        let rawCurU = linhas[i].trim();
        let periodCloseU = rawCurU.endsWith('.');
        let cur = rawCurU.replace(/\.$/, '');
        let curUp = cur.toUpperCase();
        i++;
        if (/^END-UNSTRING\b/.test(curUp)) break;
        let intoM2 = curUp.match(/\bINTO\s+([A-Z0-9][A-Z0-9-]*)/);
        if (intoM2) intoVars.push(intoM2[1]);
        if (cur) allLinesU.push(cur);
        if (periodCloseU) break; // ponto fecha o UNSTRING
      }
      let shortLabelU = 'UNSTRING ' + src + (intoVars.length ? ' INTO ' + intoVars.join(', ') : '');
      let fullDetailU = allLinesU.join('\n') + '\nEND-UNSTRING';
      nodes.push({ type: 'instr', label: shortLabelU, detail: fullDetailU });
      continue;
    }
    // EXEC SQL ... END-EXEC — comando DB2; coleta todas as linhas até END-EXEC (ou ponto)
    if (/^EXEC\s+SQL\b/i.test(lUp)) {
      let sqlLines = [l];
      while (i < linhas.length) {
        let rawS = linhas[i].trim();
        let periodCloseSQL = rawS.endsWith('.');
        let cleanS = rawS.replace(/\.$/, '');
        i++;
        if (/^END-EXEC\b/i.test(cleanS)) break;
        if (cleanS) sqlLines.push(cleanS);
        if (periodCloseSQL) break;
      }
      // Extrai o tipo de operação SQL (SELECT, INSERT, UPDATE, DELETE, FETCH, OPEN, CLOSE, CALL...)
      let allSQL = sqlLines.join(' ').toUpperCase();
      let opM = allSQL.match(/EXEC\s+SQL\s+(\w+)/);
      let sqlOp = opM ? opM[1] : 'SQL';
      // Normaliza para grupo visual (SELECT / INSERT / UPDATE / DELETE / OTHER)
      const sqlOpGroup = ['SELECT','INSERT','UPDATE','DELETE'].includes(sqlOp) ? sqlOp : 'OTHER';
      // Tabela principal (FROM/INTO/UPDATE tbl/JOIN)
      let tblM = allSQL.match(/(?:FROM|INTO|UPDATE|JOIN)\s+([A-Z0-9][A-Z0-9_#@$.:-]*)/);
      let tbl = tblM ? tblM[1] : '';
      // Label em 2 linhas: operação na 1ª, tabela na 2ª
      let shortLabel = sqlOp + (tbl ? '\n' + tbl : '');
      let fullDetail = sqlLines.join('\n') + '\nEND-EXEC';
      nodes.push({ type: 'sql', label: shortLabel, sqlOp: sqlOpGroup, detail: fullDetail });
      continue;
    }
    const thruM = lUp.match(/^PERFORM\s+([A-Z0-9][A-Z0-9-]*)\s+THRU\s+([A-Z0-9][A-Z0-9-]*)(?:\s+(.*))?$/);
    if (thruM) {
      let rest = thruM[3] ? thruM[3].trim() : '';
      if (!rest && i < linhas.length) {
        let pk = linhas[i].trim().replace(/\.$/, '').toUpperCase();
        if (/^(UNTIL|VARYING|WITH\s+TEST)\b/.test(pk) || /^\d+\s+TIMES\b/.test(pk)) { rest = pk; i++; }
      }
      while (rest && i < linhas.length) {
        let pk2 = linhas[i].trim().replace(/\.$/, '').toUpperCase();
        if (/^(AND|OR)\b/.test(pk2)) { rest += ' ' + pk2; i++; } else break;
      }
      nodes.push({ type: 'perform-thru', from: thruM[1], to: thruM[2], cond: rest || null });
      continue;
    }
    // 3. PERFORM para UNTIL cond | VARYING ... | WITH TEST BEFORE|AFTER UNTIL cond
    const perfLoopM = lUp.match(/^PERFORM\s+([A-Z0-9][A-Z0-9-]*)\s+(UNTIL\b|VARYING\b|WITH\s+TEST\b)(.*)/);
    // 4. PERFORM para n TIMES  |  PERFORM para WS-VAR TIMES
    const perfTimesM = !perfLoopM && lUp.match(/^PERFORM\s+([A-Z0-9][A-Z0-9-]*)\s+(\d+|[A-Z0-9][A-Z0-9-]*)\s+TIMES\b/);
    if (perfLoopM || perfTimesM) {
      let m = perfLoopM || perfTimesM;
      let condPart = perfLoopM
        ? (perfLoopM[2] + (perfLoopM[3] || '')).trim()
        : (perfTimesM[2] + ' TIMES').trim();
      while (i < linhas.length) {
        let pk = linhas[i].trim().replace(/\.$/, '').toUpperCase();
        if (/^(AND|OR)\b/.test(pk)) { condPart += ' ' + pk; i++; } else break;
      }
      nodes.push({ type: 'loop', label: 'PERFORM ' + m[1] + '\n' + condPart, body: null, named: m[1] });
      continue;
    }
    // 5. PERFORM para (linha única) — verifica linha seguinte por UNTIL/VARYING/TIMES
    const perfM = lUp.match(/^PERFORM\s+([A-Z0-9][A-Z0-9-]*)\s*$/);
    if (perfM) {
      let rest = null;
      if (i < linhas.length) {
        let pk = linhas[i].trim().replace(/\.$/, '').toUpperCase();
        if (/^(UNTIL|VARYING|WITH\s+TEST)\b/.test(pk) || /^\d+\s+TIMES\b/.test(pk)) {
          rest = pk; i++;
          while (i < linhas.length) {
            let pk2 = linhas[i].trim().replace(/\.$/, '').toUpperCase();
            if (/^(AND|OR)\b/.test(pk2)) { rest += ' ' + pk2; i++; } else break;
          }
        }
      }
      if (rest) {
        nodes.push({ type: 'loop', label: 'PERFORM ' + perfM[1] + '\n' + rest, body: null, named: perfM[1] });
      } else {
        nodes.push({ type: 'perform', target: perfM[1] });
      }
      continue;
    }
    // Fallback: PERFORM com forma não coberta acima
    const perfFallM = lUp.match(/^PERFORM\s+([A-Z0-9][A-Z0-9-]*)/);
    if (perfFallM) { nodes.push({ type: 'perform', target: perfFallM[1] }); continue; }
    // GO TO / GOTO — desvio incondicional; interrompe o fluxo sequencial
    // GO TO target  ou  GOTO target (com ou sem espaço entre GO e TO)
    const gotoM = lUp.match(/^GO(?:TO|\s+TO)\s+([A-Z0-9][A-Z0-9-]*)/);
    if (gotoM) {
      nodes.push({ type: 'goto', target: gotoM[1] });
      break;
    }
    // Operações de I/O — símbolo de paralelogramo no fluxograma
    if (/^(DISPLAY|ACCEPT|READ|WRITE|REWRITE|DELETE|OPEN|CLOSE)\b/.test(lUp)) {
      nodes.push({ type: 'io', label: l });
      continue;
    }
    nodes.push({ type: 'instr', label: l });
  }
  return nodes;
}

// ================= AST → ELEMENTS =================
// Renderiza uma sequência de nós AST; retorna [firstId, lastId]
function renderSeq(ast, els, uid, meta, cs, depth) {
  let first = null, prev = null, last = null;
  for (let n of ast) {
    let [nf, nl] = renderNode(n, els, uid, meta, cs, depth);
    if (!nf) continue;
    if (!first) first = nf;
    if (prev) els.push({ data: { source: prev, target: nf } });
    last = nl || nf;
    prev = last;
  }
  return [first, last];
}

function renderNode(n, els, uid, meta, cs, depth) {
  const { estrutura, tipos, secoes, ordemParagrafos, maxDepth } = meta;
  // col() retorna a coluna atual para tagear nós no layout horizontal por parágrafo
  const _col = () => meta.currentCol || 0;

  if (n.type === 'instr') {
    let id = uid('i');
    els.push({ data: { id, label: n.label, tipo: 'instrucao', col: _col(), detail: n.detail || null } });
    return [id, id];
  }

  if (n.type === 'io') {
    let id = uid('io');
    els.push({ data: { id, label: n.label, tipo: 'io', col: _col() } });
    return [id, id];
  }

  if (n.type === 'stop') {
    let id = uid('stop');
    els.push({ data: { id, label: n.label, tipo: 'stop', col: _col() } });
    return [id, id];
  }

  if (n.type === 'if') {
    let ifId = uid('if');
    els.push({ data: { id: ifId, label: n.label, tipo: 'if', col: _col() } });
    let mId = uid('mg');
    els.push({ data: { id: mId, label: '', tipo: 'merge', col: _col() } });
    if (n.sim && n.sim.length) {
      let [sf, sl] = renderSeq(n.sim, els, uid, meta, cs, depth);
      els.push({ data: { source: ifId, target: sf, label: 'SIM' } });
      els.push({ data: { source: sl || sf, target: mId } });
    } else {
      els.push({ data: { source: ifId, target: mId, label: 'SIM' } });
    }
    if (n.nao && n.nao.length) {
      let [nf2, nl2] = renderSeq(n.nao, els, uid, meta, cs, depth);
      els.push({ data: { source: ifId, target: nf2, label: 'NÃO' } });
      els.push({ data: { source: nl2 || nf2, target: mId } });
    } else {
      els.push({ data: { source: ifId, target: mId, label: 'NÃO' } });
    }
    return [ifId, mId];
  }

  if (n.type === 'perform') {
    let { target } = n;
    let eSection = tipos && tipos[target] === 'section';
    let id = uid('p');
    const _callerCol = _col();
    // Se não vai expandir, fica como nó inline na coluna do chamador (sem alocar nova coluna)
    if (depth >= meta.maxDepth || cs.has(target)) {
      els.push({ data: { id, label: target, tipo: eSection ? 'perform-section' : 'perform', target, col: _callerCol } });
      return [id, id];
    }
    // Vai expandir — nova coluna APENAS para depth===0 (chamadas diretas do bloco de entrada).
    // PERFORMs em depth>0 ficam inline na coluna do pai: sem arestas de retorno da direita p/ esquerda.
    const _newCol = (depth === 0) ? ++meta.colCounter : _callerCol;
    meta.currentCol = _newCol;
    els.push({ data: { id, label: target, tipo: eSection ? 'perform-section' : 'perform', target, col: _newCol } });
    let ns = new Set(cs);
    ns.add(target);
    if (eSection) {
      let pars = (secoes && secoes[target]) || [];
      let last = id;
      pars.forEach(par => {
        const _parCol = (depth === 0) ? ++meta.colCounter : _newCol;
        meta.currentCol = _parCol;
        let pid = uid('sp');
        els.push({ data: { id: pid, label: par, tipo: 'section-para', target: par, col: _parCol } });
        els.push({ data: { source: last, target: pid } });
        let [fc, lc] = renderSeq(buildAST(estrutura[par] || []), els, uid, meta, ns, depth + 1);
        if (fc) els.push({ data: { source: pid, target: fc } });
        last = lc || pid;
      });
      meta.currentCol = _callerCol;
      return [id, last];
    } else {
      let [fc, lc] = renderSeq(buildAST(estrutura[target] || []), els, uid, meta, ns, depth + 1);
      meta.currentCol = _callerCol;
      if (fc) els.push({ data: { source: id, target: fc } });
      return [id, lc || id];
    }
  }

  if (n.type === 'perform-thru') {
    let { from, to, cond } = n;
    let id = uid('pt');
    let thruLabel = from + ' THRU ' + to + (cond ? '\n' + cond : '');
    const _callerColThru = _col();
    els.push({ data: { id, label: thruLabel, tipo: cond ? 'loop' : 'perform', target: from, col: _callerColThru } });
    // Não expande se atingiu profundidade máxima
    if (depth >= meta.maxDepth) return [id, id];
    let fi = (ordemParagrafos || []).indexOf(from);
    let ti = (ordemParagrafos || []).indexOf(to);
    if (fi < 0 || ti < 0 || fi > ti) return [id, id];
    let range = ordemParagrafos.slice(fi, ti + 1).filter(p => tipos[p] !== 'section' && tipos[p] !== 'fim-paragrafo');
    let ns = new Set(cs);
    range.forEach(p => ns.add(p));
    let last = id;
    range.forEach(par => {
      // Perform-thru expande inline; não cria colunas separadas
      const _parColThru = _callerColThru;
      meta.currentCol = _parColThru;
      let pid = uid('p');
      els.push({ data: { id: pid, label: par, tipo: 'perform-fall', target: par, col: _parColThru } });
      els.push({ data: { source: last, target: pid } });
      let [fc, lc] = renderSeq(buildAST(estrutura[par] || []), els, uid, meta, ns, depth + 1);
      if (fc) els.push({ data: { source: pid, target: fc } });
      last = lc || pid;
    });
    meta.currentCol = _callerColThru;
    return [id, last];
  }

  if (n.type === 'loop') {
    const _loopCol = _col();
    let loopId = uid('loop');
    els.push({ data: { id: loopId, label: n.label, tipo: 'loop', col: _loopCol } });
    let mId = uid('mg');
    els.push({ data: { id: mId, label: '', tipo: 'merge', col: _loopCol } });
    if (n.body && n.body.length) {
      // Loop inline com corpo — fica na mesma coluna
      let [bf, bl_] = renderSeq(n.body, els, uid, meta, cs, depth);
      if (bf) {
        els.push({ data: { source: loopId, target: bf, label: 'LOOP', minLen: 5 } });
        if (bl_) els.push({ data: { source: bl_, target: loopId } });
      }
    } else if (n.named) {
      // Loop com parágrafo nomeado — parágrafo chamado vai para nova coluna
      let target = n.named;
      let eSection = tipos && tipos[target] === 'section';
      let pid = uid('p');
      els.push({ data: { id: pid, label: target, tipo: eSection ? 'perform-section' : 'perform', target, col: _loopCol } });
      els.push({ data: { source: loopId, target: pid, label: 'LOOP', minLen: 5 } });
      let bodyLast = pid;
      if (depth < meta.maxDepth && !cs.has(target)) {
        // Corpo do loop fica inline na mesma coluna do nó loop
        meta.currentCol = _loopCol;
        let ns = new Set(cs); ns.add(target);
        let [fc, lc] = renderSeq(buildAST(estrutura[target] || []), els, uid, meta, ns, depth + 1);
        meta.currentCol = _loopCol;
        if (fc) els.push({ data: { source: pid, target: fc } });
        bodyLast = lc || pid;
      }
      els.push({ data: { source: bodyLast, target: loopId } });
    }
    els.push({ data: { source: loopId, target: mId, label: 'FIM', minLen: 5 } });
    return [loopId, mId];
  }

  if (n.type === 'evaluate') {
    let id = uid('ev');
    els.push({ data: { id, label: n.label, tipo: 'evaluate', col: _col() } });
    return [id, id];
  }

  if (n.type === 'goto') {
    let id = uid('gt');
    els.push({ data: { id, label: 'GO TO: ' + n.target, tipo: 'goto', target: n.target, col: _col() } });
    return [id, id];
  }

  if (n.type === 'sql') {
    let id = uid('sql');
    els.push({ data: { id, label: n.label, tipo: 'sql', sqlOp: n.sqlOp || 'OTHER', col: _col(), detail: n.detail || null } });
    return [id, id];
  }

  return [null, null];
}

// ================= GARANTE PLACEHOLDER (nunca chamada) =================
function getFallThroughChain(nome, meta, thruTarget) {
  const { estrutura, tipos, ordemParagrafos } = meta;
  if (!ordemParagrafos || !tipos) return [nome];

  // Section é delimitada — não tem fall-through
  if (tipos[nome] === 'section') return [nome];

  let idx = ordemParagrafos.indexOf(nome);
  if (idx < 0) return [nome];

  let chain = [];
  for (let i = idx; i < ordemParagrafos.length; i++) {
    let p = ordemParagrafos[i];
    // Para ao encontrar outra section (boundary)
    if (i > idx && tipos[p] === 'section') break;

    let isExitPar = (estrutura[p] || []).some(l => /^EXIT\.?$/.test(l.trim()));

    // Parágrafos EXIT são marcadores de limite — não aparecem como nós visuais
    if (!isExitPar) chain.push(p);

    // Para quando atinge o limite: THRU target especificado, ou parágrafo EXIT
    if ((thruTarget && p === thruTarget) || isExitPar) break;
  }
  return [nome];
}

// ================= DETALHE =================
function montarDetalhe(nome, meta) {
  const { estrutura, tipos, secoes } = meta;
  if (!estrutura[nome]) return nome;
  if (tipos && tipos[nome] === 'section') {
    let pars = secoes[nome] || [];
    let txt = '[SECTION] ' + nome + ':\n\n';
    pars.forEach(p => {
      txt += p + ':\n';
      (estrutura[p] || []).forEach(l => txt += '   ' + l + '\n');
      txt += '\n';
    });
    return txt.trim();
  }
  let txt = '[PARÁGRAFO] ' + nome + ':\n\n';
  (estrutura[nome] || []).forEach(l => txt += '   ' + l + '\n');
  return txt.trim();
}

// ================= FLUXO =================
function gerarFluxo(estrutura, tipos, secoes, meta) {
  let els = [];
  let c = 0;
  function uid(p) { return (p || 'n') + '_' + (++c); }

  const op = meta.ordemParagrafos || [];

  // Prioridade: parágrafo MAIN > primeira section (se houver sections) > primeiro parágrafo > qualquer chave
  let temSections = op.some(p => tipos[p] === 'section');
  let main = op.find(p => p === 'MAIN')
          || (temSections ? op.find(p => tipos[p] === 'section') : null)
          || op.find(p => tipos[p] !== 'section' && tipos[p] !== 'fim-paragrafo')
          || Object.keys(estrutura)[0];
  if (!main) return els;

  // Inicializa contadores de coluna para o layout horizontal por parágrafo
  meta.colCounter = 0;
  meta.currentCol = 0;

  let entryId = uid(main);
  els.push({ data: { id: entryId, label: main, tipo: tipos[main] || 'paragrafo', target: main, col: 0 } });

  if (tipos[main] === 'section') {
    // Section como entry point: cada parágrafo da section vai para sua própria coluna
    let pars = (secoes && secoes[main]) || [];
    let last = entryId;
    let ns = new Set([main]);
    pars.forEach(par => {
      const _parCol = ++meta.colCounter;
      meta.currentCol = _parCol;
      let pid = uid('sp');
      els.push({ data: { id: pid, label: par, tipo: 'section-para', target: par, col: _parCol } });
      els.push({ data: { source: last, target: pid } });
      let nsLocal = new Set(ns);
      nsLocal.add(par);
      let [fc, lc] = renderSeq(buildAST(estrutura[par] || []), els, uid, meta, nsLocal, 0);
      if (fc) els.push({ data: { source: pid, target: fc } });
      last = lc || pid;
    });
    meta.currentCol = 0;
  } else {
    let [fc] = renderSeq(buildAST(estrutura[main] || []), els, uid, meta, new Set([main]), 0);
    if (fc) els.push({ data: { source: entryId, target: fc } });
  }

  return els;
}

    aplicarPosLayoutLoop(); // ajusta loops em TB antes de separar colunas
    aplicarLayoutColunas();
  } else {
    aplicarPosLayoutLoop();
  }

  cy.fit();
  cy.center();
  atualizarZoomLabel();

  cy.on("zoom", function() { atualizarZoomLabel(); });

  cy.on("tap", "node", function(evt) {
    let data = evt.target.data();
    let el = document.getElementById("details");
    if (data.target && meta.estrutura && meta.estrutura[data.target]) {
      el.innerText = montarDetalhe(data.target, meta);
    } else if (data.tipo === 'instrucao' || data.tipo === 'if' || data.tipo === 'stop'
            || data.tipo === 'loop'     || data.tipo === 'io'   || data.tipo === 'evaluate'
            || data.tipo === 'goto'     || data.tipo === 'sql') {
      el.innerText = data.detail || data.label || '';
    } else {
      el.innerHTML = '<span style="color:#aaa;font-size:11px;">Clique em um nó para ver detalhes</span>';
    }
    // Remove destaque do cursor (será reaplicado quando cursor mover no textarea)
    cy.elements().removeClass('cy-cursor-hl');
    if (window._resetLastPara) window._resetLastPara();
    destacarNoCobol(data);
    // Atualiza painel de comentários (se estiver aberto)
    if (window.abrirComentarioPorNo) {
      var nodeId    = data.id;
      var nodeLabel = data.label || data.target || data.id;
      window.abrirComentarioPorNo(nodeId, nodeLabel);
    }
  });

  // Clique em área vazia do diagrama: limpa destaque sem mover nada
  cy.on('tap', function(evt) {
    if (evt.target === cy) {
      cy.elements().removeClass('cy-cursor-hl');
      if (window._resetLastPara) window._resetLastPara();
    }
  });
}

// ================= DESTAQUE NO COBOL INPUT =================
/**
 * Ao clicar num nó do diagrama, localiza o trecho correspondente
 * na textarea e seleciona + rola até ele.
 */
function destacarNoCobol(data) {
  const ta = document.getElementById('input');
  if (!ta) return;
  const code = ta.value;
  const linhas = code.split('\n');

  // --- Determina a chave de busca e o modo ---
  // paraMode: seleciona o bloco completo do parágrafo
  // instrMode: seleciona somente as linhas da instrução
  let searchKey = '';
  let paraMode = false;

  if (data.target) {
    // PERFORM, loop com target, section-para → cabeçalho do parágrafo
    searchKey = data.target.trim().toUpperCase();
    paraMode = true;
  } else if (data.detail) {
    // Instrução: primeira linha não vazia do detail
    const fl = (data.detail.split('\n').find(function(s) { return s.trim(); }) || '').trim().toUpperCase();
    searchKey = fl;
  } else if (data.label) {
    searchKey = data.label.trim().toUpperCase().replace(/…$/, '').replace(/\.\.\.$/, '').trim();
  }

  if (!searchKey) return;

  // --- Localiza a linha no textarea ---
  var startChar = -1;
  var charPos = 0;

  for (var i = 0; i < linhas.length; i++) {
    var lineUp = linhas[i].trim().toUpperCase().replace(/\.$/, '');
    if (paraMode) {
      // Cabeçalho de parágrafo: linha que, sem ponto, é exatamente o nome
      if (lineUp === searchKey) { startChar = charPos; break; }
    } else {
      // Instrução: linha que contém a chave de busca (primeiros 30 chars)
      var probe = searchKey.substring(0, 30);
      if (lineUp.startsWith(probe)) { startChar = charPos; break; }
      // Fallback mais flexível
      if (probe.length > 6 && lineUp.indexOf(probe.substring(0, 10)) !== -1) { startChar = charPos; break; }
    }
    charPos += linhas[i].length + 1;
  }

  if (startChar === -1) return;

  // --- Determina o fim da seleção ---
  var endChar;

  if (paraMode) {
    // Seleciona até antes do próximo cabeçalho de parágrafo/seção
    var cp2 = 0;
    var inBlock = false;
    endChar = code.length;
    for (var j = 0; j < linhas.length; j++) {
      if (cp2 >= startChar) {
        if (!inBlock) { inBlock = true; }
        else {
          var t = linhas[j].trim().toUpperCase().replace(/\.$/, '');
          // Linha de cabeçalho: palavra de 3+ chars, apenas letras/dígitos/hífen,
          // na coluna 7-8 (COBOL), sem verbo no início
          if (t && /^[A-Z][A-Z0-9-]{2,}$/.test(t)) { endChar = cp2; break; }
        }
      }
      cp2 += linhas[j].length + 1;
    }
  } else {
    // Instrução: seleciona quantas linhas tiver o detail
    var nDetailLines = data.detail ? data.detail.split('\n').length : 1;
    var pos = startChar;
    for (var k = 0; k < nDetailLines && pos < code.length; k++) {
      var nl = code.indexOf('\n', pos);
      if (nl === -1) { pos = code.length; break; }
      pos = nl + 1;
    }
    endChar = pos;
  }

  // --- Aplica seleção e rola o textarea para centralizar o trecho ---
  // Sinaliza que o foco/clique seguinte no textarea é programático (não do usuário)
  _ignorarCursorMove = true;
  ta.focus();
  ta.setSelectionRange(startChar, endChar);
  // Libera o flag após os eventos de foco/click serem processados
  setTimeout(function() { _ignorarCursorMove = false; }, 100);

  // Calcula linha alvo a partir do offset inicial
  var beforeSel = code.substring(0, startChar);
  var lineNum = (beforeSel.match(/\n/g) || []).length;
  var totalLines = (code.match(/\n/g) || []).length + 1;

  // Usa scrollHeight real da textarea (mais confiável do que getComputedStyle)
  var lh = ta.scrollHeight / Math.max(totalLines, 1);
  var targetScroll = Math.max(0, (lineNum * lh) - (ta.clientHeight / 2) + (lh / 2));

  // Aplica scroll imediatamente
  ta.scrollTop = targetScroll;

  // Flash visual na textarea para indicar a sincronização
  ta.style.transition = 'box-shadow 0.1s';
  ta.style.boxShadow = '0 0 0 3px #1565c0';
  clearTimeout(ta._flashTimer);
  ta._flashTimer = setTimeout(function() {
    ta.style.boxShadow = '';
    setTimeout(function() { ta.style.transition = ''; }, 200);
  }, 500);
}

/** Faz download de um blob/dataURL com o nome especificado */
function _download(urlOrData, nome) {
  var a = document.createElement('a');
  a.href = urlOrData;
  a.download = nome;
  a.click();
}

/** Retorna nome base para exportação (program-id ou timestamp) */

  var m = ta.match(/PROGRAM-ID\.?\s+([A-Z0-9][A-Z0-9-]*)/i);
  return (m ? m[1] : 'fluxo-cobol').toLowerCase();
}
